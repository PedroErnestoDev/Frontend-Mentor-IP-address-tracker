<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  
  <title>Frontend Mentor | IP Address Tracker</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
  <header>
    <h1>IP Address Tracker</h1>
    <div class="container-search">
      <input type="text" id="input-adress-ip" placeholder="Search for any IP address or domain">
      <button id="botao-buscar-ip">
        <img src="images/icon-arrow.svg" alt="">
      </button>
    </div>
    <div class="container-dados-ip">
      <div class="ip-address box-dados">
        <span>IP ADDRESS</span>
        <p id="p-ip-address"></p>
      </div>
      <div class="location box-dados">
        <span>LOCATION</span>
        <p id="p-location"></p>
      </div>
      <div class="timezone box-dados">
        <span>TIMEZONE</span>
        <p id="p-timezone"></p>
      </div>
      <div class="isp box-dados">
        <span>ISP</span>
        <p id="p-isp"></p>
      </div>
    </div>
    </header>
  <div id="map"></div>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">PedroErnestoDev</a>.
  </div>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
